<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple LLM Chatbot</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 40px auto;
    background: #f5f6fa;
    color: #2f3640;
  }
  h1 { text-align: center; }
  #chat-box {
    background: white;
    border: 1px solid #dcdde1;
    border-radius: 8px;
    height: 420px;
    overflow-y: auto;
    padding: 16px;
    margin-bottom: 12px;
  }
  .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; max-width: 80%; }
  .user { background: #dff9fb; margin-left: auto; text-align: right; }
  .bot { background: #f1f2f6; }
  form { display: flex; gap: 8px; }
  input[type=text] {
    flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #dcdde1;
  }
  button {
    padding: 10px 18px; border: none; border-radius: 6px;
    background: #273c75; color: white; cursor: pointer;
  }
  button:disabled { background: #718093; cursor: not-allowed; }
</style>
</head>
<body>
  <h1>Simple LLM Chatbot</h1>
  <div id="chat-box"></div>
  <form id="chat-form">
    <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off" required>
    <button type="submit" id="send-btn">Send</button>
  </form>

<script>
const chatBox = document.getElementById('chat-box');
const form = document.getElementById('chat-form');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, 'user');
  input.value = '';
  sendBtn.disabled = true;
  addMessage('Thinking...', 'bot');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message})
    });
    const data = await res.json();
    chatBox.removeChild(chatBox.lastChild); // remove "Thinking..."
    addMessage(data.response, 'bot');
  } catch (err) {
    chatBox.removeChild(chatBox.lastChild);
    addMessage('Error reaching server.', 'bot');
  } finally {
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
